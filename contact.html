<body>

    <header>
        <h1>Nala Xiriir</h1>
        <nav>
            <a href="index.html">Hoyga</a>
            <a href="team.html">Kooxda</a>
            <a href="registration.html">Is-diiwaangeli</a>
            <a href="contact.html">Nala Xiriir</a>
        </nav>
    </header>

    <div class="wrapper">
        <div class="form-container">
            <h2>Farriin Noo Soo Dir</h2>
            <p>Haddii aad qabto wax su'aal ah ama aad u baahantahay adeegyadeena, fadlan foomkan buuxi.</p>
            <br>
            <form action="#" method="POST">
                
                <div class="form-group">
                    <label for="contact-name">Magacaaga:</label>
                    <input type="text" id="contact-name" name="contact-name" required>
                </div>

                <div class="form-group">
                    <label for="contact-email">Email-kaaga:</label>
                    <input type="email" id="contact-email" name="contact-email" required>
                </div>

                <div class="form-group">
                    <label for="subject">Moowduuca Farriinta:</label>
                    <input type="text" id="subject" name="subject" required>
                </div>

                <div class="form-group">
                    <label for="message">Farriintaada:</label>
                    <textarea id="message" name="message" rows="5" required placeholder="Halkan ku qor farriintaada..."></textarea>
                </div>

                <button type="submit">Soo Dir Farriinta</button>

            </form>
        </div>
    </div>

    <footer>

    </footer>
